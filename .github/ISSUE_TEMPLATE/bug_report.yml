name: Bug report
description: Something is broken
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: cpscribe version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
